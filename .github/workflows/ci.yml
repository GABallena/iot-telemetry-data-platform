name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  STORAGE_BACKEND: local

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ dashboard/ airflow/ run_pipeline.py

      - name: Run ruff format check
        run: ruff format --check src/ tests/ dashboard/ airflow/ run_pipeline.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_smoke.py

  smoke:
    name: Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run smoke test
        run: pytest tests/test_smoke.py -v

  deploy:
    name: Deploy (gated)
    runs-on: ubuntu-latest
    needs: [smoke]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t telemetry-pipeline:${{ github.sha }} .

      - name: Tag latest
        run: docker tag telemetry-pipeline:${{ github.sha }} telemetry-pipeline:latest

      - name: Deploy notice
        run: echo "Deployment step — extend with registry push or deploy commands"
